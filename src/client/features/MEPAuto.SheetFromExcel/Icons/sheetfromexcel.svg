<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#217346"/>

  <!-- Excel table (top-left area) -->
  <rect x="3" y="4" width="12" height="10" rx="1" fill="#fff" opacity="0.95"/>
  <!-- Grid -->
  <line x1="7" y1="4" x2="7" y2="14" stroke="#217346" stroke-width="0.7"/>
  <line x1="11" y1="4" x2="11" y2="14" stroke="#217346" stroke-width="0.7"/>
  <line x1="3" y1="7.3" x2="15" y2="7.3" stroke="#217346" stroke-width="0.7"/>
  <line x1="3" y1="10.6" x2="15" y2="10.6" stroke="#217346" stroke-width="0.7"/>

  <!-- Arrow pointing right-down -->
  <path d="M16 10 L20 10 L20 7.5 L24 11 L20 14.5 L20 12 L16 12 Z" fill="#fff" opacity="0.9"/>

  <!-- Sheet/Document (bottom-right) -->
  <rect x="17" y="16" width="12" height="13" rx="1" fill="#fff" opacity="0.95"/>
  <!-- Title block border -->
  <rect x="18.5" y="17.5" width="9" height="10" fill="none" stroke="#217346" stroke-width="0.6" rx="0.3"/>
  <!-- Title block strip -->
  <rect x="18.5" y="24.5" width="9" height="3" fill="#217346" opacity="0.15"/>
  <line x1="18.5" y1="24.5" x2="27.5" y2="24.5" stroke="#217346" stroke-width="0.5"/>
  <!-- Content lines on sheet -->
  <line x1="20" y1="20" x2="26" y2="20" stroke="#217346" stroke-width="0.7" opacity="0.5"/>
  <line x1="20" y1="22" x2="25" y2="22" stroke="#217346" stroke-width="0.7" opacity="0.5"/>

  <!-- Stacked sheets indicator (behind main sheet) -->
  <rect x="19" y="18" width="12" height="13" rx="1" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.4" transform="translate(-4,-4)"/>
</svg>
