# MEPAuto VPS deploy — variant "nginx container".
#
# Dùng khi VPS chưa có nginx system-level, hoặc cho phép nginx container expose 80/443.
# Variant "nginx system" (shared VPS với EPAuto) → dùng docker-compose.system-nginx.yml.
#
# Build context = repo root (cd ../.., docker compose -f tools/deploy/docker-compose.yml ...)

name: mepauto  # Explicit project name — tránh conflict với EPAuto cùng dùng /tools/deploy/.

services:
  api:
    build:
      context: ../..
      dockerfile: src/server/MEPAuto.Server.Api/Dockerfile
    image: mepauto-api:latest
    container_name: mepauto-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - JWT__SIGNING_KEY=${JWT_SIGNING_KEY}
      - JWT__ISSUER=${JWT_ISSUER:-https://api.mepauto.local}
      - JWT__AUDIENCE=${JWT_AUDIENCE:-mepauto-client}
      - JWT__REFRESHTOKENHOURS=${JWT_REFRESHTOKENHOURS:-8}
      - DataDir=/var/mepauto-data
    volumes:
      - /var/mepauto-data:/var/mepauto-data
    restart: unless-stopped
    networks: [mepauto]
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: mepauto-nginx
    ports:
      - "80:80"
      # 443 chỉ expose khi đã có cert (domain + Let's Encrypt). Phase HTTP-only test → comment dòng dưới.
      - "443:443"
    volumes:
      # NGINX_CONF chọn config: nginx.conf (TLS) hoặc nginx-http-only.conf (test không TLS).
      # Set qua .env: NGINX_CONF=nginx-http-only.conf
      - ./${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    networks: [mepauto]

networks:
  mepauto:
    driver: bridge
