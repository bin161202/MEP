# MEPAuto VPS deploy — variant "standalone API on port 8081" (DEFAULT cho shared VPS).
#
# VPS này đã có:
#   - epauto-nginx (container) chiếm host port 80/443
#   - epauto-api (container, port 8080 internal qua epauto-nginx)
#   - efauto-api (container, host port 5001 → 8080)
#
# MEPAuto bind host port 8081 → 8080 (giống pattern efauto-api). KHÔNG cần nginx system.
# Sau này muốn TLS: thêm reverse proxy ở mức cao hơn hoặc subdomain qua epauto-nginx.
#
# HOST_BIND mặc định 0.0.0.0 (cho phép truy cập từ ngoài). Set HOST_BIND=127.0.0.1 trong .env để giới hạn localhost.

services:
  api:
    build:
      context: ../..
      dockerfile: src/server/MEPAuto.Server.Api/Dockerfile
    image: mepauto-api:latest
    container_name: mepauto-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - JWT__SIGNING_KEY=${JWT_SIGNING_KEY}
      - JWT__ISSUER=${JWT_ISSUER:-https://api.mepauto.local}
      - JWT__AUDIENCE=${JWT_AUDIENCE:-mepauto-client}
      - DataDir=/var/mepauto-data
    volumes:
      - /var/mepauto-data:/var/mepauto-data
    restart: unless-stopped
    ports:
      # Bind ${HOST_BIND}:8081 → container 8080. Port 8081 vì 8080 đã EPAuto chiếm internal.
      - "${HOST_BIND:-0.0.0.0}:8081:8080"
