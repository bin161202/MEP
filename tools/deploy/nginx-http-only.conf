# MEPAuto nginx — HTTP only (test nội bộ, KHÔNG có domain + TLS).
# Dùng tạm cho giai đoạn test. Khi có domain → đổi sang nginx.conf (có TLS).
#
# Bind vào docker-compose.yml: mount file này thay vì nginx.conf.
# Hoặc set trong .env: NGINX_CONF=nginx-http-only.conf
#
# CẢNH BÁO: JWT đi qua HTTP plain text → CHỈ dùng cho test nội bộ trên LAN/VPN,
# KHÔNG dùng production qua internet công cộng. Khi nào ship cho user thật → bắt buộc TLS.

upstream mepauto_api {
    server api:8080;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=mepauto_auth_login:10m rate=10r/m;

server {
    listen 80 default_server;
    server_name _;  # match bất kỳ host (test theo IP)

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location = /api/v1/auth/login {
        limit_req zone=mepauto_auth_login burst=5 nodelay;
        proxy_pass http://mepauto_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://mepauto_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
