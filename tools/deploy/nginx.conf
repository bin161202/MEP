# MEPAuto nginx config — dùng cho variant "nginx container" (docker-compose.yml).
# DOMAIN sẽ được envsubst trước deploy nếu cần, hoặc edit thủ công.

upstream mepauto_api {
    server api:8080;
    keepalive 32;
}

# Rate limit zone cho /auth/login (chống brute force)
limit_req_zone $binary_remote_addr zone=mepauto_auth_login:10m rate=10r/m;

# HTTP → HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    server_name api.mepauto.local;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS API
server {
    listen 443 ssl http2;
    server_name api.mepauto.local;

    ssl_certificate     /etc/letsencrypt/live/api.mepauto.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mepauto.local/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Rate limit chỉ áp lên login endpoint
    location = /api/v1/auth/login {
        limit_req zone=mepauto_auth_login burst=5 nodelay;
        proxy_pass http://mepauto_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://mepauto_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
